name: Update Inven Feed

on:
  schedule:
    - cron: "0 * * * *"   # 매시 정각 (UTC 기준, 한국시간 +9)
  workflow_dispatch: {}     # 수동 실행 버튼도 사용 가능

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest inven posts
        run: python scripts/fetch_inven.py

      - name: Commit if changed
        run: |
          git config user.name "aion2-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/latest.json
          git diff --cached --quiet || git commit -m "chore: update inven feed [skip ci]"
          git push
